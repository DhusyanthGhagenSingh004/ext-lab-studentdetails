<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button.delete {
            background: #ff6b6b;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        button.delete:hover {
            background: #ff5252;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .action-cell {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Student Details Management</h1>
        
        <div class="form-section">
            <h2 style="margin-bottom: 15px; color: #333;">Add New Student</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" id="name" placeholder="Enter student name">
                </div>
                <div class="form-group">
                    <label for="marks">Marks:</label>
                    <input type="number" id="marks" placeholder="Enter marks" min="0" max="100">
                </div>
            </div>
            <button onclick="addStudent()">Add Student</button>
        </div>
        
        <h2 style="margin-bottom: 20px; color: #333;">Student List</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Marks</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                <tr>
                    <td>1</td>
                    <td>Dhusyanth</td>
                    <td>88</td>
                    <td class="action-cell">
                        <button class="delete" onclick="deleteStudent(1)">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Rahul</td>
                    <td>78</td>
                    <td class="action-cell">
                        <button class="delete" onclick="deleteStudent(2)">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>suresh</td>
                    <td>71</td>
                    <td class="action-cell">
                        <button class="delete" onclick="deleteStudent(3)">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>john</td>
                    <td>69</td>
                    <td class="action-cell">
                        <button class="delete" onclick="deleteStudent(4)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <script>
        function addStudent() {
            const name = document.getElementById('name').value.trim();
            const marks = document.getElementById('marks').value;
            
            if (!name || !marks) {
                alert('Please fill in all fields');
                return;
            }
            
            alert('Student added: ' + name + ' with marks: ' + marks);
            document.getElementById('name').value = '';
            document.getElementById('marks').value = '';
        }
        
        function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                alert('Student with ID ' + id + ' deleted successfully!');
            }
        }
    </script>
</body>
</html>
