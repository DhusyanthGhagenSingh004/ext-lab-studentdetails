<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button.delete {
            background: #ff6b6b;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        button.delete:hover {
            background: #ff5252;
        }
        
        button.edit {
            background: #51cf66;
            padding: 5px 10px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        button.edit:hover {
            background: #40c057;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .action-cell {
            text-align: center;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 12px;
        }
        
        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Student Details Management</h1>
        
        <div id="alert" class="alert"></div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avgMarks">0</div>
                <div class="stat-label">Average Marks</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="highestMarks">0</div>
                <div class="stat-label">Highest Marks</div>
            </div>
        </div>
        
        <div class="form-section">
            <h2 style="margin-bottom: 15px; color: #333;">Add New Student</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" id="name" placeholder="Enter student name">
                </div>
                <div class="form-group">
                    <label for="marks">Marks:</label>
                    <input type="number" id="marks" placeholder="Enter marks" min="0" max="100">
                </div>
            </div>
            <button onclick="addStudent()">➕ Add Student</button>
        </div>
        
        <h2 style="margin-bottom: 20px; color: #333;">Student List</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Marks</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                <tr class="no-data">
                    <td colspan="4">No students added yet. Add a student to get started!</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <script>
        // Initialize students array from localStorage
        let students = JSON.parse(localStorage.getItem('students')) || [
            { id: 1, name: 'Dhusyanth', marks: 88 },
            { id: 2, name: 'Rahul', marks: 78 },
            { id: 3, name: 'Suresh', marks: 71 },
            { id: 4, name: 'John', marks: 69 }
        ];
        
        // Initialize nextId
        let nextId = Math.max(...students.map(s => s.id), 0) + 1;
        
        // Load and display students on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderStudents();
            updateStats();
        });
        
        function addStudent() {
            const name = document.getElementById('name').value.trim();
            const marks = document.getElementById('marks').value;
            
            if (!name) {
                showAlert('Please enter a student name', 'error');
                return;
            }
            
            if (!marks || marks < 0 || marks > 100) {
                showAlert('Please enter valid marks (0-100)', 'error');
                return;
            }
            
            // Add new student
            const newStudent = {
                id: nextId++,
                name: name,
                marks: parseInt(marks)
            };
            
            students.push(newStudent);
            saveStudents();
            renderStudents();
            updateStats();
            
            // Clear form
            document.getElementById('name').value = '';
            document.getElementById('marks').value = '';
            
            showAlert(`Student "${name}" added successfully!`, 'success');
        }
        
        function deleteStudent(id) {
            const student = students.find(s => s.id === id);
            if (!student) return;
            
            if (confirm(`Are you sure you want to delete ${student.name}?`)) {
                students = students.filter(s => s.id !== id);
                saveStudents();
                renderStudents();
                updateStats();
                showAlert(`Student "${student.name}" deleted successfully!`, 'success');
            }
        }
        
        function renderStudents() {
            const tableBody = document.getElementById('studentTable');
            
            if (students.length === 0) {
                tableBody.innerHTML = '<tr class="no-data"><td colspan="4">No students added yet. Add a student to get started!</td></tr>';
                return;
            }
            
            tableBody.innerHTML = students.map(student => `
                <tr>
                    <td>${student.id}</td>
                    <td>${escapeHtml(student.name)}</td>
                    <td>${student.marks}</td>
                    <td class="action-cell">
                        <button class="delete" onclick="deleteStudent(${student.id})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function updateStats() {
            const total = students.length;
            const avgMarks = total > 0 ? (students.reduce((sum, s) => sum + s.marks, 0) / total).toFixed(2) : 0;
            const highest = total > 0 ? Math.max(...students.map(s => s.marks)) : 0;
            
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('avgMarks').textContent = avgMarks;
            document.getElementById('highestMarks').textContent = highest;
        }
        
        function saveStudents() {
            localStorage.setItem('students', JSON.stringify(students));
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
